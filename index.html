		<link rel="stylesheet" href="css/components/container.css">
	</head>
	<body>

	<div class="banner">

	</div>

				<img src="images/semi-marathon.png" alt="half-marathon">

			</div>
			<div class="card">
				<img src="images/marathon.png" alt="marathon">
				<h3>Marathon : 42km</h3>
			</div>
		</div>
	
	<div id="apply-section">
		<div data-tf-live="01KN2N7AV48M4J8W8BTVFR1MWA"></div><script src="//embed.typeform.com/next/embed.js"></script>
